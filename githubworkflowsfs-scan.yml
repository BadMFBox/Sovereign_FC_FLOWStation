# ═══════════════════════════════════════════════════════════════
#  .github/workflows/fs-scan.yml
#  Runs fluid scan on PR — posts organized report as comment
#  AiZQuad FlowStation Lab
# ═══════════════════════════════════════════════════════════════

name: FlowStation · Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

permissions:
  pull-requests: write
  contents:      read

jobs:
  scan:
    name: Fluid Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need diff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          npm ci --ignore-scripts
          pip install -r requirements.txt

      - name: Detect Changed Rooms
        id: rooms
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep '^forge/active/' \
            | cut -d'/' -f3 \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)
          echo "rooms=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed rooms: ${CHANGED}"

      - name: Run Fluid Scan
        id: scan
        if: steps.rooms.outputs.rooms != ''
        run: |
          mkdir -p shared/scan_reports

          for ROOM in ${{ steps.rooms.outputs.rooms }}; do
            echo "Scanning: $ROOM"
            node dist/cli/fluid-scan.js \
              --room "$ROOM" \
              --format json \
              --output "shared/scan_reports/${ROOM}.scan.json"
          done

      - name: Build PR Comment
        id: comment
        if: steps.rooms.outputs.rooms != ''
        run: |
          node dist/cli/fluid-report.js \
            --scans "shared/scan_reports/" \
            --format markdown \
            --output "shared/pr_comment.md"
          
          # Make it available to next step
          echo 'comment<<EOF' >> $GITHUB_OUTPUT
          cat shared/pr_comment.md >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: steps.rooms.outputs.rooms != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs      = require('fs');
            const comment = fs.readFileSync('shared/pr_comment.md', 'utf8');

            // Find existing FlowStation comment and update it
            const comments = await github.rest.issues.listComments({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.body.includes('⚡ FlowStation Fluid Scan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
