<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowStation Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e27;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: calc(100vh - 150px);
            gap: 2px;
            padding: 2px;
        }
        /* Bottom room spans both columns */
        #room-bottom {
            grid-column: 1 / 3;
        }
        .room {
            background: #1a1a2e;
            border: 1px solid #00ff00;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .room-header {
            padding: 6px;
            font-weight: bold;
            font-size: 11px;
        }
        .room-content {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }
        /* Split bottom room internally */
        .bottom-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            height: 100%;
        }
        .bottom-left {
            border-right: 2px solid #9c27b0;
            padding-right: 8px;
        }
        .bottom-right {
            border-left: 2px solid #ff6b00;
            padding-left: 8px;
        }
    </style>
</head>
<body>
